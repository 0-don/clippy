id: io.github._0_don.clippy
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20
command: clippy
rename-icon: clippy
finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --device=dri
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar

build-options:
  append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin

modules:
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json

  - name: clippy
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/clippy/cargo
        CARGO_NET_OFFLINE: "true"
    build-commands:
      - npm ci --offline --legacy-peer-deps --cache=$PWD/flatpak-node/npm-cache
      - cargo --offline fetch --manifest-path src-tauri/Cargo.toml
      - |
        OCR_VERSION=$(ls ${CARGO_HOME}/vendor/ | grep -oP 'ocr-rs-\K[0-9.]+' | head -1)
        if [ -n "$OCR_VERSION" ]; then
          MNN_VENDOR_DIR="${CARGO_HOME}/vendor/ocr-rs-${OCR_VERSION}/3rd_party/prebuilt"
          mkdir -p "${MNN_VENDOR_DIR}"
          ARCH_NAME="$(uname -m)"
          [ "$ARCH_NAME" = "x86_64" ] && ARCH_NAME="x86_64" || ARCH_NAME="aarch64"
          TARBALL="mnn-dev-linux-${ARCH_NAME}.tar.gz"
          if [ -f "$TARBALL" ]; then
            cp "$TARBALL" "${MNN_VENDOR_DIR}/"
            tar xzf "${MNN_VENDOR_DIR}/${TARBALL}" -C "${MNN_VENDOR_DIR}/"
          fi
        fi
      - npx tauri build --no-bundle
      - install -Dm755 src-tauri/target/release/clippy -t /app/bin/
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/clippy.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/clippy.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/clippy.png
      - install -Dm644 .github/flathub/io.github._0_don.clippy.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 src-tauri/clippy.desktop /app/share/applications/io.github._0_don.clippy.desktop
    sources:
      - type: git
        url: https://github.com/0-don/clippy.git
        commit: {{COMMIT_HASH}}
      - node-sources.json
      - cargo-sources.json
      - type: file
        url: https://github.com/zibo-chen/MNN-Prebuilds/releases/download/dev/mnn-dev-linux-x86_64.tar.gz
        sha256: {{MNN_X86_64_SHA256}}
        only-arches:
          - x86_64
      - type: file
        url: https://github.com/zibo-chen/MNN-Prebuilds/releases/download/dev/mnn-dev-linux-aarch64.tar.gz
        sha256: {{MNN_AARCH64_SHA256}}
        only-arches:
          - aarch64
